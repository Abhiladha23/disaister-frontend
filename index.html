<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>disAIster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Space Grotesk', sans-serif; }
.glass {
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
  opacity: 0.8;
}
.stat-number {
  font-size: 26px;
  font-weight: 700;
}
</style>

</head>

<body class="h-screen flex flex-col bg-[#0b1220] text-white">

<!-- HEADER -->
<header class="flex justify-between items-center px-6 py-3 bg-[#0f172a] border-b border-slate-800">
  <div class="flex items-center gap-3">
    <img src="logo.png" class="h-8">
    <h1 class="text-lg font-bold tracking-wide">disAIster</h1>
  </div>

  <input id="locationSearch"
         type="text"
         placeholder="Search location..."
         class="px-4 py-2 rounded-lg bg-[#1a2336] text-sm w-96 outline-none">

  <div class="text-xs text-green-400 tracking-wide">
    ● SYSTEM ONLINE
  </div>
</header>

<!-- MAIN -->
<main class="flex flex-1 overflow-hidden">

  <!-- LEFT SIDEBAR -->
  <aside class="w-72 p-4 flex flex-col gap-4 glass border-r border-slate-800">

    <div>
      <div class="panel-title">Primary Incident Zone</div>
      <div class="mt-3 flex justify-between">
        <div>
          <div class="text-xs opacity-60">Incidents</div>
          <div id="primaryIncidentCount" class="stat-number text-red-400">0</div>
        </div>
        <div>
          <div class="text-xs opacity-60">Risk</div>
          <div id="primaryRisk" class="stat-number">LOW</div>
        </div>
      </div>
    </div>

    <div class="flex-1">
      <div class="panel-title mb-2">Remote Monitoring</div>
      <div id="remoteLocationsContainer"
           class="text-sm space-y-1 opacity-80">
      </div>
    </div>

  </aside>

  <!-- MAP -->
  <div id="map" class="flex-1"></div>

  <!-- RIGHT SIDEBAR -->
  <aside class="w-80 p-4 flex flex-col gap-4 glass border-l border-slate-800">

    <!-- SOS -->
    <div class="p-6 rounded-xl border border-red-500 text-center">
      <div class="text-3xl font-bold text-red-500 mb-2">SOS</div>
      <button onclick="triggerSOS()"
              class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg font-semibold">
        TAP TO ACTIVATE
      </button>
    </div>

    <!-- AI -->
    <div class="flex-1 flex flex-col">
      <div class="panel-title mb-2">AI Analysis</div>
      <input id="aiInput"
             placeholder="Report incident..."
             class="px-3 py-2 rounded bg-[#1a2336] text-sm"
             onkeydown="if(event.key==='Enter')sendAIQuery()">
    </div>

    <!-- QUICK ACTIONS -->
    <div>
      <div class="panel-title mb-2">Quick Actions</div>
      <div class="grid grid-cols-2 gap-2">

        <button onclick="triggerAction('drone')"
                class="bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-sm">
          Deploy Drone
        </button>

        <button onclick="triggerAction('aid')"
                class="bg-green-600 hover:bg-green-700 py-2 rounded-lg text-sm">
          Request Aid
        </button>

        <button onclick="triggerAction('evacuate')"
                class="bg-yellow-500 hover:bg-yellow-600 py-2 rounded-lg text-sm">
          Evacuate
        </button>

        <button onclick="triggerAction('lockdown')"
                class="bg-purple-600 hover:bg-purple-700 py-2 rounded-lg text-sm">
          Lockdown
        </button>

      </div>
    </div>

  </aside>

</main>

<script src="script.js"></script>
</body>
</html>
