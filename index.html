<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>disAIster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="flex flex-col h-screen bg-black text-white">

<header class="flex justify-between items-center px-6 py-3 bg-[#0b1220]">
  <h1 class="text-xl font-bold">disAIster</h1>
  <input id="locationSearch" type="text" placeholder="Search location..."
         class="px-3 py-2 rounded bg-[#1a2336] text-sm w-72">
</header>

<main class="flex flex-1">

  <!-- LEFT PANEL -->
  <div class="w-64 bg-[#0f172a] p-4 flex flex-col gap-4">
    <div>
      <div class="text-sm opacity-70">Incidents</div>
      <div id="primaryIncidentCount" class="text-2xl font-bold">0</div>
    </div>

    <div>
      <div class="text-sm opacity-70">Risk Level</div>
      <div id="primaryRisk" class="text-lg">LOW</div>
    </div>

    <div>
      <div class="text-sm opacity-70">Remote Monitoring</div>
      <div id="remoteLocationsContainer" class="text-xs mt-2 space-y-1"></div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map" class="flex-1"></div>

  <!-- RIGHT PANEL -->
  <div class="w-72 bg-[#0f172a] p-4 flex flex-col gap-4">

    <button onclick="triggerSOS()"
            class="bg-red-600 py-2 rounded font-bold">
      SOS
    </button>

    <div>
      <input id="aiInput"
             placeholder="Report incident..."
             class="w-full px-3 py-2 rounded bg-[#1a2336] text-sm"
             onkeydown="if(event.key==='Enter')sendAIQuery()">
    </div>

    <div class="grid grid-cols-2 gap-2">
      <button onclick="triggerAction('drone')" class="bg-blue-600 py-2 rounded text-sm">Deploy Drone</button>
      <button onclick="triggerAction('aid')" class="bg-green-600 py-2 rounded text-sm">Request Aid</button>
      <button onclick="triggerAction('evacuate')" class="bg-yellow-600 py-2 rounded text-sm">Evacuate</button>
      <button onclick="triggerAction('lockdown')" class="bg-purple-600 py-2 rounded text-sm">Lockdown</button>
    </div>

  </div>

</main>

<script src="script.js"></script>
</body>
</html>
