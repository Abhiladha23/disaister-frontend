<!DOCTYPE html>
<html>
<head>
    <title>disAIster</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        #map {
            flex: 3;
        }

        #panel {
            flex: 1;
            background: #0f172a;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
        }

        button {
            cursor: pointer;
        }

        #incidentCount {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
    <h2>disAIster</h2>

    <div>Incidents: <span id="incidentCount">0</span></div>

    <input id="searchInput" placeholder="Search location..." />
    <button onclick="searchLocation()">Search</button>

    <hr>

    <input id="incidentInput" placeholder="Describe incident..." />
    <button onclick="analyzeIncident()">Analyze Incident</button>

    <hr>

    <button onclick="triggerSOS()">🚨 SOS</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="script.js"></script>

</body>
</html>
